; Alembic configuration (Phase 1, 2026-06-01 — ADR-001).
;
; The actual connection URL is loaded at runtime from
; app.config.Settings.database_url_async — see alembic/env.py.
; We DO NOT put the URL here because (a) we want one source of truth
; (Pydantic Settings) and (b) we don't want secrets in version control.

[alembic]
script_location = alembic
prepend_sys_path = .
; Format new revision files with a timestamp prefix so they sort
; chronologically in the filesystem regardless of merge order.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
; PostgreSQL is the target. Don't allow SQLite (it lacks JSONB, partial
; indexes, gen_random_uuid()).
version_locations = alembic/versions
output_encoding = utf-8

[post_write_hooks]
; Optional: enable black/ruff hooks here after the first migration ships.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
